name: Backup Diário Supabase

on:
  schedule:
    - cron: '0 6 * * *'  # Todo dia às 06:00 UTC (03:00 Brasília)
  workflow_dispatch:       # Permite rodar manualmente

jobs:
  backup:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install requests

      - name: Exportar backup do Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python3 << 'EOF'
          import requests, json, os
          from datetime import datetime

          url = os.environ['SUPABASE_URL']
          key = os.environ['SUPABASE_SERVICE_KEY']
          headers = {
              'apikey': key,
              'Authorization': f'Bearer {key}',
              'Content-Type': 'application/json'
          }

          tabelas = [
              'municipios',
              'municipios_historico', 
              'pipeline_tracking',
              'indicadores_externos',
              'perfis',
              'fontes_dados',
          ]

          data = datetime.now().strftime('%Y-%m-%d')
          os.makedirs(f'backups/{data}', exist_ok=True)

          for tabela in tabelas:
              print(f'Exportando {tabela}...')
              all_rows = []
              offset = 0
              limit = 1000
              
              while True:
                  r = requests.get(
                      f'{url}/rest/v1/{tabela}',
                      headers={**headers, 'Range': f'{offset}-{offset+limit-1}'},
                      params={'select': '*', 'order': 'id'}
                  )
                  if r.status_code not in [200, 206]:
                      print(f'  Erro {r.status_code}: {r.text[:100]}')
                      break
                  rows = r.json()
                  if not rows:
                      break
                  all_rows.extend(rows)
                  if len(rows) < limit:
                      break
                  offset += limit

              with open(f'backups/{data}/{tabela}.json', 'w', encoding='utf-8') as f:
                  json.dump(all_rows, f, ensure_ascii=False, indent=2, default=str)
              print(f'  {len(all_rows)} registros salvos')

          print(f'\nBackup completo: {data}')
          EOF

      - name: Commit e push do backup
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add backups/
          git diff --staged --quiet || git commit -m "backup automático $(date +'%Y-%m-%d')"
          git push
